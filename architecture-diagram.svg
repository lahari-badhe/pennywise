<svg width="680" height="980" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">

  <!-- USER -->
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="47" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">You (the user)</text>
  <line x1="340" y1="64" x2="340" y2="94" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- REACT UI LAYER -->
  <rect x="60" y="96" width="560" height="120" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">React UI — what you see on screen</text>
  <text x="340" y="134" text-anchor="middle" font-size="12" fill="#534AB7">App.jsx — all screens live here. State drives which screen shows.</text>

  <!-- 4 screens -->
  <rect x="76" y="144" width="118" height="56" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="135" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Upload</text>
  <text x="135" y="185" text-anchor="middle" font-size="11" fill="#444441">photo drop zone</text>

  <rect x="208" y="144" width="118" height="56" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="267" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Scanning</text>
  <text x="267" y="185" text-anchor="middle" font-size="11" fill="#444441">loading animation</text>

  <rect x="340" y="144" width="118" height="56" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="399" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Results</text>
  <text x="399" y="185" text-anchor="middle" font-size="11" fill="#444441">items + chat</text>

  <rect x="472" y="144" width="132" height="56" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="538" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Dashboard</text>
  <text x="538" y="185" text-anchor="middle" font-size="11" fill="#444441">charts + history</text>

  <!-- Flow arrows from screens -->
  <line x1="200" y1="216" x2="200" y2="254" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-coral)"/>
  <line x1="480" y1="216" x2="480" y2="254" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Flow labels -->
  <text x="155" y="240" text-anchor="middle" font-size="11" fill="#D85A30" font-weight="600">receipt flow</text>
  <text x="530" y="240" text-anchor="middle" font-size="11" fill="#185FA5" font-weight="600">chat flow</text>

  <!-- RECEIPT FLOW -->
  <rect x="80" y="256" width="240" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="200" y="279" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Step 1 — toBase64()</text>
  <text x="200" y="297" text-anchor="middle" font-size="11" fill="#993C1D">converts image → long text string</text>
  <line x1="200" y1="308" x2="200" y2="346" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-coral)"/>

  <rect x="80" y="348" width="240" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="200" y="371" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Step 2 — POST to Groq</text>
  <text x="200" y="389" text-anchor="middle" font-size="11" fill="#993C1D">sends base64 image + prompt</text>
  <line x1="200" y1="400" x2="260" y2="438" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-coral)"/>

  <!-- CHAT FLOW -->
  <rect x="360" y="256" width="240" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="480" y="279" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">sendMessage()</text>
  <text x="480" y="297" text-anchor="middle" font-size="11" fill="#185FA5">reads all saved receipts</text>
  <line x1="480" y1="308" x2="480" y2="346" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="360" y="348" width="240" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="480" y="371" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Builds context</text>
  <text x="480" y="389" text-anchor="middle" font-size="11" fill="#185FA5">receipt history + chat history</text>
  <line x1="480" y1="400" x2="420" y2="438" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- GROQ AI -->
  <rect x="160" y="440" width="360" height="60" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="464" text-anchor="middle" font-size="14" font-weight="600" fill="#412402">Groq AI (Llama 4 Scout model)</text>
  <text x="340" y="484" text-anchor="middle" font-size="11" fill="#854F0B">reads image OR answers chat questions — returns text</text>
  <line x1="260" y1="500" x2="220" y2="538" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-coral)"/>
  <line x1="420" y1="500" x2="460" y2="538" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- PARSE RESPONSES -->
  <rect x="80" y="540" width="240" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="200" y="563" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Step 3 — parse JSON</text>
  <text x="200" y="581" text-anchor="middle" font-size="11" fill="#993C1D">JSON.parse → React state</text>
  <line x1="200" y1="592" x2="200" y2="630" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow-coral)"/>

  <rect x="360" y="540" width="240" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="480" y="563" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Chat reply added</text>
  <text x="480" y="581" text-anchor="middle" font-size="11" fill="#185FA5">setMessages(prev + reply)</text>
  <line x1="480" y1="592" x2="480" y2="630" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- STORAGE LAYER -->
  <rect x="80" y="632" width="240" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="200" y="655" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">localStorage (browser)</text>
  <text x="200" y="673" text-anchor="middle" font-size="11" fill="#3B6D11">saves receipt permanently on device</text>
  <line x1="200" y1="684" x2="200" y2="722" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="360" y="632" width="240" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="480" y="655" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">React state (RAM)</text>
  <text x="480" y="673" text-anchor="middle" font-size="11" fill="#5F5E5A">chat history — resets on close</text>
  <line x1="340" y1="658" x2="340" y2="722" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- DASHBOARD LAYER -->
  <rect x="60" y="724" width="560" height="136" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="750" text-anchor="middle" font-size="14" font-weight="600" fill="#04342C">Dashboard + Savings Score (reads from localStorage)</text>
  <text x="340" y="766" text-anchor="middle" font-size="11" fill="#0F6E56">calculates totals and renders charts from all saved receipts</text>

  <rect x="76" y="778" width="122" height="64" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="137" y="802" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Score 0–100</text>
  <text x="137" y="818" text-anchor="middle" font-size="11" fill="#444441">set by Groq AI</text>
  <text x="137" y="832" text-anchor="middle" font-size="11" fill="#444441">per receipt</text>

  <rect x="212" y="778" width="122" height="64" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="273" y="802" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Monthly bar</text>
  <text x="273" y="818" text-anchor="middle" font-size="11" fill="#444441">group receipts</text>
  <text x="273" y="832" text-anchor="middle" font-size="11" fill="#444441">by month</text>

  <rect x="348" y="778" width="122" height="64" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="409" y="802" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Pie chart</text>
  <text x="409" y="818" text-anchor="middle" font-size="11" fill="#444441">group items</text>
  <text x="409" y="832" text-anchor="middle" font-size="11" fill="#444441">by category</text>

  <rect x="484" y="778" width="120" height="64" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="544" y="802" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">History list</text>
  <text x="544" y="818" text-anchor="middle" font-size="11" fill="#444441">click any old</text>
  <text x="544" y="832" text-anchor="middle" font-size="11" fill="#444441">receipt</text>

  <!-- LEGEND -->
  <rect x="60" y="890" width="560" height="72" rx="8" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="0.8"/>
  <text x="340" y="910" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Legend</text>
  <rect x="80" y="920" width="12" height="12" rx="2" fill="#1D9E75"/>
  <text x="98" y="931" font-size="11" fill="#444441">localStorage (permanent, device only)</text>
  <rect x="270" y="920" width="12" height="12" rx="2" fill="#7F77DD"/>
  <text x="288" y="931" font-size="11" fill="#444441">React UI layer</text>
  <rect x="390" y="920" width="12" height="12" rx="2" fill="#EF9F27"/>
  <text x="408" y="931" font-size="11" fill="#444441">Groq AI brain</text>
  <rect x="490" y="920" width="12" height="12" rx="2" fill="#D85A30"/>
  <text x="508" y="931" font-size="11" fill="#444441">receipt scan steps</text>
  <rect x="80" y="942" width="12" height="12" rx="2" fill="#378ADD"/>
  <text x="98" y="953" font-size="11" fill="#444441">chat flow steps</text>

  <!-- ARROW MARKERS -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
