<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1c1a17">How the savings score (0–100) is calculated</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#5F5E5A">Groq AI evaluates every receipt against these 4 factors and returns a single number</text>

  <!-- Factor 1: Store type -->
  <rect x="40" y="70" width="140" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="110" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Store type</text>
  <text x="110" y="116" text-anchor="middle" font-size="11" fill="#993C1D">Premium shop</text>
  <text x="110" y="130" text-anchor="middle" font-size="11" fill="#993C1D">scores lower</text>

  <!-- Factor 2: Item prices -->
  <rect x="200" y="70" width="140" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="270" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Item prices</text>
  <text x="270" y="116" text-anchor="middle" font-size="11" fill="#854F0B">Overpriced vs</text>
  <text x="270" y="130" text-anchor="middle" font-size="11" fill="#854F0B">fair market value</text>

  <!-- Factor 3: Bulk buying -->
  <rect x="360" y="70" width="140" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="430" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Bulk buying</text>
  <text x="430" y="116" text-anchor="middle" font-size="11" fill="#185FA5">Single units score</text>
  <text x="430" y="130" text-anchor="middle" font-size="11" fill="#185FA5">lower than bulk</text>

  <!-- Factor 4: Alternatives -->
  <rect x="520" y="70" width="140" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="590" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Alternatives</text>
  <text x="590" y="116" text-anchor="middle" font-size="11" fill="#0F6E56">Cheaper options</text>
  <text x="590" y="130" text-anchor="middle" font-size="11" fill="#0F6E56">exist = lower score</text>

  <!-- Arrows to Groq box -->
  <line x1="110" y1="150" x2="250" y2="210" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <line x1="270" y1="150" x2="295" y2="210" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <line x1="430" y1="150" x2="385" y2="210" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <line x1="590" y1="150" x2="430" y2="210" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow-amber)"/>

  <!-- Groq output box -->
  <rect x="195" y="210" width="290" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Groq returns: savings_score: 50</text>
  <text x="340" y="250" text-anchor="middle" font-size="11" fill="#854F0B">also returns savings_summary (2 sentence explanation)</text>

  <!-- Arrows to score bands -->
  <line x1="270" y1="262" x2="175" y2="293" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="262" x2="340" y2="293" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="410" y1="262" x2="505" y2="293" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Score bands -->
  <rect x="100" y="295" width="148" height="32" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="174" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">75–100 — Smart Shopper</text>

  <rect x="266" y="295" width="148" height="32" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="340" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">50–74 — Room to Improve</text>

  <rect x="432" y="295" width="148" height="32" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="506" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#4A1B0C">0–49 — Overspending Alert</text>

</svg>
